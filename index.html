<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jony's Music Factory</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0c29">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-192.png">
</head>
<body>
  <div class="bg-blur"></div>

  <!-- STICKY HEADER -->
  <div class="sticky-header">
    <header class="visualizer-wrap">
      <canvas id="visualizer"></canvas>
    </header>

    <section class="now-playing">
      <img id="cover" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%238B5CF6'/%3E%3Cstop offset='100%25' stop-color='%23EC4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='100' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='system-ui, sans-serif' font-size='180' font-weight='900' fill='white'%3EJMF%3C/text%3E%3C/svg%3E" alt="Album art">
      <div class="song-meta">
        <h2 id="song-title">No Song Playing</h2>
        <p id="song-artist">Tap + to add music</p>
      </div>
    </section>
  </div>

  <main class="playlist-wrap">
    <div class="playlist-header">
      <h3>Playlist</h3>
      <div class="add-buttons">
        <button id="add-folder">📁 Folder</button>
        <button id="add-files">➕ Songs</button>
        <button id="clear-playlist" style="background:#ef4444;border:none;color:white;padding:6px 12px;border-radius:20px;font-size:0.85rem;">🗑️</button>
      </div>
    </div>
    <ul id="playlist"></ul>
    <div id="empty-state">No songs yet. Add a folder or files to start.</div>
  </main>

  <footer class="player-bar">
    <div class="progress-wrap">
      <span id="current-time">0:00</span>
      <div class="seek-container">
        <canvas id="waveform" width="800" height="40"></canvas>
        <input type="range" id="seek" value="0" min="0" max="100">
      </div>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <div class="vu-meter">
        <div class="vu-led" data-level="1"></div>
        <div class="vu-led" data-level="2"></div>
        <div class="vu-led" data-level="3"></div>
        <div class="vu-led" data-level="4"></div>
        <div class="vu-led" data-level="5"></div>
        <div class="vu-led" data-level="6"></div>
        <div class="vu-led" data-level="7"></div>
        <div class="vu-led" data-level="8"></div>
      </div>
      <button id="shuffle" aria-label="Shuffle">🔀</button>
      <button id="prev">⏮</button>
      <button id="play" aria-label="Play">▶</button>
      <button id="next">⏭</button>
      <button id="repeat" aria-label="Repeat">🔁</button>
      <button id="eq-toggle" aria-label="EQ">🎚️</button>
      <div class="volume-wrap">
        <span>🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
      </div>
    </div>
  </footer>

  <div id="eq-panel" class="eq-panel hidden">
    <div class="eq-header">
      <span>Equalizer</span>
      <button id="eq-close">✕</button>
    </div>
    <div class="eq-bands">
      <div class="eq-band">
        <label>Bass<br>60Hz</label>
        <input type="range" id="bass" min="-12" max="12" value="0" step="1" orient="vertical">
        <span class="eq-value">0dB</span>
      </div>
      <div class="eq-band">
        <label>Mid<br>1kHz</label>
        <input type="range" id="mid" min="-12" max="12" value="0" step="1" orient="vertical">
        <span class="eq-value">0dB</span>
      </div>
      <div class="eq-band">
        <label>Treble<br>12kHz</label>
        <input type="range" id="treble" min="-12" max="12" value="0" step="1" orient="vertical">
        <span class="eq-value">0dB</span>
      </div>
    </div>
    <button id="eq-reset">Reset</button>
  </div>

  <audio id="audio" crossorigin="anonymous"></audio>
  <input type="file" id="file-input" accept="audio/*" multiple style="display:none">
  <input type="file" id="folder-input" webkitdirectory multiple style="display:none">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
